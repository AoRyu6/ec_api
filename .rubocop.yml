inherit_gem:
  rubocop-shopify: rubocop.yml
plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails
  - rubocop-factory_bot
  - rubocop-performance
  - rubocop-rake

# Rails Department
Rails/ActionOrder:
  Enabled: true

Rails/ActiveRecordCallbacksOrder:
  Enabled: true

Rails/DuplicateAssociation:
  Enabled: true

# Rspec Department
RSpec/ContextWording:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/DescribedClass:
  Enabled: false

RSpecRails/HaveHttpStatus:
  Enabled: true

# FactoryBot Department
FactoryBot/ConsistentParenthesesStyle:
  Enabled: true

FactoryBot/FactoryNameStyle:
  Enabled: true

FactoryBot/IdSequence:
  Enabled: true

FactoryBot/SyntaxMethods:
  Enabled: true

FactoryBot/FactoryAssociationWithStrategy:
  Enabled: true
